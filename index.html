<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KiotPro - Ultimate POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="light-theme">
    <div id="app" class="app-container">
      <!-- Sidebar Navigation -->
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">
          <h2>Kiot<span class="text-primary">Pro</span></h2>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="dashboard">
            <i data-lucide="layout-dashboard"></i>
            <span>Tổng quan</span>
          </a>
          <a href="#" class="nav-item" data-view="pos">
            <i data-lucide="shopping-cart"></i>
            <span>Bán hàng (POS)</span>
          </a>
          <a href="#" class="nav-item" data-view="orders">
            <i data-lucide="clipboard-list"></i>
            <span>Quản lý đơn hàng</span>
          </a>
          <a href="#" class="nav-item" data-view="inventory">
            <i data-lucide="package"></i>
            <span>Hàng hóa</span>
          </a>
          <a href="#" class="nav-item" data-view="crm">
            <i data-lucide="users"></i>
            <span>Đối tác & Công nợ</span>
          </a>
          <a href="#" class="nav-item" data-view="reports">
            <i data-lucide="bar-chart-2"></i>
            <span>Báo cáo</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <button id="theme-toggle" class="btn-icon" title="Toggle Theme">
            <i data-lucide="moon"></i>
          </button>
          <div class="user-profile">
            <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="Admin" />
            <div class="user-info">
              <span class="user-name">Admin User</span>
              <span class="user-role">Quản lý</span>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="main-content">
        <header class="topbar glass-panel">
          <h1 id="page-title">Tổng quan</h1>
          <div class="topbar-actions">
            <div class="search-bar">
              <i data-lucide="search"></i>
              <input type="text" placeholder="Tìm kiếm nhanh (F3)...">
            </div>
            <button class="btn btn-primary" id="btn-quick-sale">
              <i data-lucide="plus"></i> Bán Hàng Nhanh
            </button>
            <button class="btn-icon notification-btn">
              <i data-lucide="bell"></i>
              <span class="badge">3</span>
            </button>
          </div>
        </header>
        
        <div id="view-container" class="view-container">
          <!-- Dynamic Content Loads Here -->
        </div>
      </main>
    </div>

    <!-- Order Detail Modal -->
    <div id="order-detail-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content glass-panel fade-in" style="max-width: 800px; width: 95%;">
        <div class="modal-header">
          <h3>Chi tiết Đơn hàng & Khách hàng</h3>
          <button class="btn-icon" onclick="window.closeOrderDetail()"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body" style="display: flex; gap: 2rem;">
          <!-- Customer Info -->
          <div style="flex: 1; border-right: 1px solid var(--border-color); padding-right: 1.5rem;">
            <h4 style="margin-bottom: 1rem; color: var(--primary);">Thông tin Khách hàng</h4>
            <div id="od-customer-info" style="font-size: 0.9rem; line-height: 1.6;">
              <!-- Populated dynamically -->
            </div>
          </div>
          
          <!-- Order Info & Edit -->
          <div style="flex: 1.5;">
            <h4 style="margin-bottom: 1rem; color: var(--primary);">Thông tin Đơn hàng: <span id="od-order-id"></span></h4>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label>Số tiền khách đã thanh toán (VNĐ)</label>
              <input type="number" id="od-paid" class="form-control" style="font-weight: bold; color: var(--primary);">
              <small class="text-danger" id="od-debt-warning"></small>
            </div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label>Trạng thái Giao hàng</label>
              <select id="od-shipping" class="form-control">
                <option value="Chưa ship">Chưa ship</option>
                <option value="Đã ship">Đã ship</option>
                <option value="Đổi trả">Đổi trả</option>
              </select>
            </div>
            <div class="form-group">
              <label>Ghi chú / Yêu cầu thêm</label>
              <textarea id="od-note" class="form-control" style="height: 80px; resize: none;"></textarea>
            </div>
            <input type="hidden" id="od-hidden-order-id">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="window.closeOrderDetail()">Đóng</button>
          <button class="btn btn-primary" onclick="window.saveOrderDetail()">Lưu Thay Đổi</button>
        </div>
      </div>
    </div>

    <!-- Product / Import Modal -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
      <div class="modal-content glass-panel fade-in" style="max-width: 500px; width: 95%;">
        <div class="modal-header">
          <h3>Thêm / Nhập Hàng Hóa Mới</h3>
          <button class="btn-icon" onclick="window.closeProductModal()"><i data-lucide="x"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group" style="margin-bottom: 1rem;">
            <label>Mã hàng (Để trống sẽ tự tạo)</label>
            <input type="text" id="prod-id" class="form-control" placeholder="VD: SP001">
          </div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label>Tên hàng hóa *</label>
            <input type="text" id="prod-name" class="form-control" placeholder="Áo thun nam...">
          </div>
          <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
            <div class="form-group" style="flex: 1;">
              <label>Giá vốn (VNĐ) *</label>
              <input type="number" id="prod-cost" class="form-control" placeholder="0">
            </div>
            <div class="form-group" style="flex: 1;">
              <label>Giá bán (VNĐ) *</label>
              <input type="number" id="prod-price" class="form-control" placeholder="0">
            </div>
          </div>
          <div class="form-group" style="margin-bottom: 1rem;">
            <label>Số lượng nhập kho *</label>
            <input type="number" id="prod-stock" class="form-control" placeholder="0">
          </div>
          <div class="form-group">
            <label>Link ảnh (URL) HOẶC Tải ảnh từ máy tính</label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="text" id="prod-img" class="form-control" placeholder="https://..." style="flex: 1;">
              <input type="file" id="prod-img-file" accept="image/*" style="display: none;" onchange="window.handleImageUpload(event)">
              <button class="btn btn-secondary" onclick="document.getElementById('prod-img-file').click()" style="padding: 0.6rem; font-size: 0.9rem;">
                <i data-lucide="image"></i> Tải ảnh
              </button>
            </div>
            <div id="prod-img-preview" style="margin-top: 0.5rem; display: none;">
              <img src="" style="max-width: 100px; max-height: 100px; border-radius: 0.5rem; border: 1px solid var(--border-color); object-fit: cover;">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="window.closeProductModal()">Hủy</button>
          <button class="btn btn-primary" onclick="window.saveProduct()">Lưu Hàng Hóa</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
